<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Document QA</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1e2334;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --muted: #7b8099;
    --accent: #5b7cf6;
    --accent2: #7c9dff;
    --green: #34d399;
    --red: #f87171;
    --amber: #fbbf24;
    --radius: 10px;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: 56px 1fr;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .logo { width: 28px; height: 28px; border-radius: 8px; background: var(--accent); display: grid; place-items: center; font-size: 15px; }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .api-key-field {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 5px 10px;
    color: var(--muted);
    font-size: 12px;
    font-family: var(--mono);
    width: 200px;
    outline: none;
    transition: border-color .15s;
  }
  .api-key-field:focus { border-color: var(--accent); color: var(--text); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* ── Sidebar ── */
  aside {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-section h2 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 12px; }

  /* Upload area */
  .drop-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    color: var(--muted);
    font-size: 13px;
  }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: rgba(91,124,246,.06); color: var(--text); }
  .drop-zone .icon { font-size: 24px; margin-bottom: 6px; }
  .drop-zone input { display: none; }

  textarea.doc-paste {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 12px;
    padding: 8px;
    resize: vertical;
    outline: none;
    font-family: inherit;
    line-height: 1.5;
    margin-top: 8px;
    transition: border-color .15s;
  }
  textarea.doc-paste:focus { border-color: var(--accent); }
  input.doc-title {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    font-family: inherit;
    margin-bottom: 6px;
    transition: border-color .15s;
  }
  input.doc-title:focus { border-color: var(--accent); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: 8px; }
  .btn-primary:hover { opacity: .88; }
  .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 5px; }
  .btn-danger { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.25); }
  .btn-danger:hover { background: rgba(248,113,113,.25); }

  /* Doc list */
  .doc-list { flex: 1; overflow-y: auto; padding: 8px; }
  .doc-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: background .15s, border-color .15s;
    margin-bottom: 4px;
  }
  .doc-item:hover { background: var(--bg3); border-color: var(--border); }
  .doc-icon { font-size: 16px; flex-shrink: 0; }
  .doc-info { flex: 1; min-width: 0; }
  .doc-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-meta { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .doc-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(91,124,246,.18);
    color: var(--accent2);
    flex-shrink: 0;
  }
  .empty-list { padding: 24px 16px; text-align: center; color: var(--muted); font-size: 12px; }

  /* ── Main ── */
  main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Chat area */
  .chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .message { display: flex; gap: 12px; max-width: 820px; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: grid; place-items: center;
    font-size: 14px; flex-shrink: 0;
  }
  .avatar.user-av { background: var(--accent); }
  .avatar.ai-av { background: var(--bg3); border: 1px solid var(--border2); }
  .bubble {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    line-height: 1.65;
    font-size: 14px;
  }
  .message.user .bubble { background: rgba(91,124,246,.15); border-color: rgba(91,124,246,.3); }
  .bubble p + p { margin-top: 8px; }

  .sources-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .source-chip {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 5px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .source-chip .score { color: var(--green); font-family: var(--mono); }

  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); animation: bounce .9s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  .welcome {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--muted); text-align: center;
    padding: 40px;
  }
  .welcome .big { font-size: 40px; }
  .welcome h2 { font-size: 20px; font-weight: 600; color: var(--text); }
  .welcome p { max-width: 360px; line-height: 1.6; font-size: 13px; }

  /* Input bar */
  .input-bar {
    padding: 16px 24px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-wrap {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    padding: 2px 6px;
    transition: border-color .15s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  #question-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-size: 14px;
    padding: 10px;
    outline: none;
    resize: none;
    font-family: inherit;
    line-height: 1.5;
    max-height: 120px;
  }
  .send-btn {
    background: var(--accent);
    border: none;
    border-radius: 7px;
    color: #fff;
    width: 38px; height: 38px;
    display: grid; place-items: center;
    cursor: pointer;
    font-size: 16px;
    transition: opacity .15s, transform .1s;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: .85; }
  .send-btn:active { transform: scale(.94); }
  .send-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 8px; padding: 10px 18px;
    font-size: 13px; opacity: 0; transition: opacity .25s;
    pointer-events: none; z-index: 100;
  }
  #toast.show { opacity: 1; }
  #toast.err { border-color: var(--red); color: var(--red); }
  #toast.ok  { border-color: var(--green); color: var(--green); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">🔍</div>
  <h1>Document QA</h1>
  <div class="header-right">
    <input class="api-key-field" id="api-key" type="password" placeholder="X-API-Key" value="dev-secret-key"/>
    <div class="status-dot" id="status-dot" title="API healthy"></div>
  </div>
</header>

<!-- Sidebar -->
<aside>
  <div class="sidebar-section">
    <h2>Upload file</h2>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">📄</div>
      <div>Drop PDF, TXT or MD</div>
      <div style="font-size:11px;margin-top:4px">or click to browse</div>
      <input type="file" id="file-input" accept=".pdf,.txt,.md" onchange="uploadFile(this.files[0])"/>
    </div>
  </div>

  <div class="sidebar-section">
    <h2>Paste text</h2>
    <input class="doc-title" id="paste-title" placeholder="Document title"/>
    <textarea class="doc-paste" id="paste-content" rows="4" placeholder="Paste document content here…"></textarea>
    <button class="btn btn-primary" onclick="ingestPasted()">➕ Index document</button>
  </div>

  <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;border-bottom:none">
    <h2 style="flex-shrink:0">Indexed documents <span id="doc-count" style="color:var(--accent)"></span></h2>
    <div class="doc-list" id="doc-list">
      <div class="empty-list">No documents yet.<br/>Upload or paste one above.</div>
    </div>
  </div>
</aside>

<!-- Main chat -->
<main>
  <div class="chat-window" id="chat-window">
    <div class="welcome" id="welcome">
      <div class="big">🤖</div>
      <h2>Ask anything about your docs</h2>
      <p>Index documents using the sidebar, then ask questions below. Answers are grounded in your uploaded content.</p>
    </div>
  </div>
  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="question-input" rows="1" placeholder="Ask a question about your documents…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendQuestion()}"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendQuestion()" title="Send">➤</button>
  </div>
</main>

<div id="toast"></div>

<script>
const API = '';  // same origin

function apiKey() { return document.getElementById('api-key').value.trim(); }
function headers(extra={}) {
  return { 'Content-Type':'application/json', 'X-API-Key': apiKey(), ...extra };
}

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2800);
}

// ── Health check ──────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(API + '/health');
    document.getElementById('status-dot').style.background = r.ok ? 'var(--green)' : 'var(--red)';
  } catch { document.getElementById('status-dot').style.background = 'var(--red)'; }
}
checkHealth();

// ── Documents ─────────────────────────────────────────────────────────────
async function loadDocs() {
  try {
    const r = await fetch(API + '/documents', { headers: {'X-API-Key': apiKey()} });
    if (!r.ok) return;
    const { documents } = await r.json();
    renderDocs(documents);
  } catch {}
}

function renderDocs(docs) {
  const el = document.getElementById('doc-list');
  document.getElementById('doc-count').textContent = docs.length ? `(${docs.length})` : '';
  if (!docs.length) {
    el.innerHTML = '<div class="empty-list">No documents yet.<br/>Upload or paste one above.</div>';
    return;
  }
  el.innerHTML = docs.map(d => `
    <div class="doc-item">
      <div class="doc-icon">📝</div>
      <div class="doc-info">
        <div class="doc-name" title="${d.title}">${d.title}</div>
        <div class="doc-meta">${d.num_chunks} chunk${d.num_chunks!==1?'s':''} · ${d.created_at.slice(0,10)}</div>
      </div>
      <span class="doc-badge">${d.num_chunks}</span>
      <button class="btn btn-sm btn-danger" onclick="deleteDoc('${d.id}','${d.title.replace(/'/g,'\\\'')}')" title="Delete">✕</button>
    </div>
  `).join('');
}

async function deleteDoc(id, title) {
  if (!confirm(`Delete "${title}"?`)) return;
  const r = await fetch(`${API}/documents/${id}`, { method:'DELETE', headers: {'X-API-Key': apiKey()} });
  if (r.ok) { toast(`"${title}" deleted`); loadDocs(); }
  else toast('Delete failed', 'err');
}

async function ingestPasted() {
  const title = document.getElementById('paste-title').value.trim();
  const content = document.getElementById('paste-content').value.trim();
  if (!title || !content) { toast('Enter a title and content', 'err'); return; }
  const r = await fetch(API + '/documents', {
    method: 'POST',
    headers: headers(),
    body: JSON.stringify({ documents: [{ title, content }] })
  });
  if (r.ok) {
    toast(`"${title}" indexed ✓`);
    document.getElementById('paste-title').value = '';
    document.getElementById('paste-content').value = '';
    loadDocs();
  } else { toast('Ingestion failed', 'err'); }
}

async function uploadFile(file) {
  if (!file) return;
  toast('Uploading…');
  const fd = new FormData();
  fd.append('file', file);
  const r = await fetch(API + '/documents/upload', {
    method: 'POST',
    headers: { 'X-API-Key': apiKey() },
    body: fd
  });
  if (r.ok) {
    const body = await r.json();
    toast(`"${body.ingested[0].title}" indexed ✓`);
    loadDocs();
  } else { toast('Upload failed', 'err'); }
  document.getElementById('file-input').value = '';
}

// Drag & drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); uploadFile(e.dataTransfer.files[0]); });

// ── Chat ──────────────────────────────────────────────────────────────────
function appendMessage(role, content, sources=[]) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const win = document.getElementById('chat-window');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role==='user'?'user-av':'ai-av'}`;
  avatar.textContent = role === 'user' ? '👤' : '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = `<p>${escHtml(content).replace(/\n/g,'<br>')}</p>`;

  if (sources.length) {
    const row = document.createElement('div');
    row.className = 'sources-row';
    sources.forEach(s => {
      const chip = document.createElement('span');
      chip.className = 'source-chip';
      chip.innerHTML = `📄 ${escHtml(s.title)} <span class="score">${(s.score*100).toFixed(0)}%</span>`;
      chip.title = s.content.slice(0,200);
      row.appendChild(chip);
    });
    bubble.appendChild(row);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
  return div;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showTyping() {
  const win = document.getElementById('chat-window');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="avatar ai-av">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendQuestion() {
  const input = document.getElementById('question-input');
  const question = input.value.trim();
  if (!question) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  appendMessage('user', question);
  showTyping();

  try {
    const r = await fetch(API + '/query', {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ question, top_k: 5 })
    });
    removeTyping();
    if (r.ok) {
      const data = await r.json();
      appendMessage('ai', data.answer, data.sources);
    } else {
      const err = await r.json().catch(() => ({}));
      appendMessage('ai', `Error: ${err.detail || r.statusText}`);
    }
  } catch (e) {
    removeTyping();
    appendMessage('ai', 'Network error. Is the server running?');
  }

  document.getElementById('send-btn').disabled = false;
}

// Initial load
loadDocs();
</script>
</body>
</html>
